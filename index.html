<!doctype html>
<html lang="es" class="scroll-smooth dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enzo Norese — Backend Developer & Cloud Architect. Especializado en Microsoft Azure, arquitecturas escalables y migración de sistemas críticos."
    />
    <title>Enzo Norese · Backend Developer & Cloud Architect</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Anti-flash: aplica el tema antes del paint -->
    <script>
      ;(function () {
        var t = localStorage.getItem('theme')
        var html = document.documentElement
        if (t === 'light') {
          html.classList.remove('dark')
        } else {
          html.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
